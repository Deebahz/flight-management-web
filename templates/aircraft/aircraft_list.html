{% extends 'base.html' %}

{% block content %}

<h2>Aircraft Management</h2>

<table class="table">

<tr>
    <th>Registration</th>
    <th>Name</th>
    <th>Total Hours</th>
    <th>Status</th>
</tr>

{% for aircraft in aircrafts %}

<tr>

<td>{{ aircraft.registration_no }}</td>

<td>{{ aircraft.aircraft_name }}</td>

<td>{{ aircraft.total_hours }}</td>

<td>{{ aircraft.status }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
